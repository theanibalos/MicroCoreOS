name: CI Pipeline

# Docs-only changes (markdown, LICENSE) don't execute code — skip the pipeline.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: microcoreos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Real Redis so the state parity suite (tests/tools/test_state_parity.py)
      # runs against actual infrastructure instead of skipping itself.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      # Real RabbitMQ so the broker parity suite
      # (tests/tools/test_event_bus_rabbitmq_parity.py) runs instead of skipping.
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      # RustFS needs a custom command so it can't run as a service container —
      # started as a step instead (same pattern as smoke-boot uses for S3).
      # The S3 parity fixture sets all credentials via monkeypatch; no extra
      # env vars are needed here.
      - name: Start RustFS (S3 parity tests)
        run: |
          docker run -d --rm --name rustfs -p 9000:9000 \
            -e RUSTFS_ACCESS_KEY=minioadmin -e RUSTFS_SECRET_KEY=minioadmin \
            rustfs/rustfs:latest server /data --console-address ":9001"
          echo "Waiting for RustFS..."
          for i in $(seq 1 30); do
            if curl -s --max-time 2 http://localhost:9000 > /dev/null 2>&1; then
              echo "RustFS ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "RustFS did not respond after 60s"
          docker logs rustfs
          exit 1

      - name: Lint (ruff)
        run: uv run -m ruff check .

      - name: Verify core compilation (Syntax Check)
        run: |
          uv run python -c "from core.kernel import Kernel; print('✅ Kernel OK')"
          uv run python -c "from core.container import Container; print('✅ Container OK')"
          uv run python -c "from core.base_plugin import BasePlugin; print('✅ BasePlugin OK')"
          uv run python -c "from core.base_tool import BaseTool; print('✅ BaseTool OK')"

      - name: Run Core Tests
        run: uv run -m pytest tests/ -v --tb=short

  # Boots the REAL system against REAL infrastructure (MinIO as S3, SQLite on
  # disk) and asserts that every tool is OK and every plugin is READY. This is
  # the gate that makes boot-time validation count: a tool can only prove it is
  # alive if its backend is actually mounted.
  smoke-boot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      # RustFS needs a custom command so it can't run as a service container —
      # started as a step instead.
      - name: Start RustFS (real S3 backend)
        run: |
          docker run -d --rm --name rustfs -p 9000:9000 \
            -e RUSTFS_ACCESS_KEY=minioadmin -e RUSTFS_SECRET_KEY=minioadmin \
            rustfs/rustfs:latest server /data --console-address ":9001"
          echo "Waiting for RustFS..."
          for i in $(seq 1 30); do
            if curl -s --max-time 2 http://localhost:9000 > /dev/null 2>&1; then
              echo "RustFS ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "RustFS did not respond after 60s"
          docker logs rustfs
          exit 1

      - name: Boot system against real infrastructure
        env:
          PYTHONUNBUFFERED: "1"
          AUTH_SECRET_KEY: ci-smoke-test-secret-key-0123456789abcdef
          HTTP_PORT: "5000"
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_S3_ENDPOINT_URL: http://localhost:9000
          AWS_S3_VERIFY_SSL: "false"
        run: |
          cp -r extras/available_tools/s3 tools/
          uv run main.py > boot.log 2>&1 &
          APP_PID=$!

          # Wait until the gateway answers (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ping > /dev/null 2>&1; then break; fi
            sleep 1
          done

          curl -sf http://localhost:5000/ping
          curl -sf http://localhost:5000/system/status > status.json

          # Assert: every tool OK, every plugin READY
          uv run python - <<'EOF'
          import json
          status = json.load(open("status.json"))
          assert status["success"], "system/status reported failure"
          bad_tools = [t for t in status["data"]["tools"] if t["status"] != "OK"]
          bad_plugins = [p for p in status["data"]["plugins"] if p["status"] != "READY"]
          assert not bad_tools, f"Tools not OK: {bad_tools}"
          assert not bad_plugins, f"Plugins not READY: {bad_plugins}"
          names = {t["name"] for t in status["data"]["tools"]}
          assert {"db", "s3", "http", "auth", "event_bus", "state"} <= names, f"Missing tools: {names}"
          print(f"✅ {len(status['data']['tools'])} tools OK, {len(status['data']['plugins'])} plugins READY")
          EOF

          # Assert: S3 connected to REAL infrastructure (not degraded mode)
          grep -q "\[S3Tool\] Connected" boot.log || { echo "S3 did not connect to MinIO"; cat boot.log; exit 1; }

          # Lint gate: the boot linters are advisory at runtime, but CI is the
          # hard gate — any arch violation, tool drift, or event contract
          # warning on the booted system fails the pipeline.
          curl -sf http://localhost:5000/system/lint > lint.json
          uv run python - <<'EOF'
          import json
          lint = json.load(open("lint.json"))
          assert lint["success"], "system/lint reported failure"
          data = lint["data"]
          contract_warnings = [
              f for f in data["event_contract_violations"]
              if f.get("severity") == "warning"
          ]
          assert not data["arch_violations"], f"Arch violations: {data['arch_violations']}"
          assert not data["drift_warnings"], f"Tool drift: {data['drift_warnings']}"
          assert not contract_warnings, f"Event contract warnings: {contract_warnings}"
          print("✅ Lint gate clean: no arch violations, no drift, no contract warnings")
          EOF

          kill $APP_PID

      - name: Show boot log on failure
        if: failure()
        run: cat boot.log || true
